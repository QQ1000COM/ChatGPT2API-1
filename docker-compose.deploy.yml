services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${CHATGPT2API_IMAGE:-chatgpt2api:deploy}
    container_name: ${CHATGPT2API_CONTAINER:-chatgpt2api}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:80"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1/docs', timeout=5)\nPY"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
